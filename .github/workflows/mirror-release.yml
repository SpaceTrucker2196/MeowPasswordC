name: Mirror Release to river-io

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to mirror (e.g. v1.0.0)"
        required: true
        type: string

jobs:
  mirror:
    # Only run on the source repo. The mirror at river-io/MeowPasswordC
    # gets this file via the mirror push; without this guard a release
    # publish on the mirror (triggered by the source-mirror tag push)
    # would re-run this workflow on river-io and try to push river-io
    # back to river-io — fails by design.
    if: github.repository == 'SpaceTrucker2196/MeowPasswordC'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Resolve tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Push branch and tag to river-io/MeowPasswordC
        env:
          RIVER_IO_PAT: ${{ secrets.RIVER_IO_PAT }}
          TAG: ${{ steps.vars.outputs.tag }}
        run: |
          git remote add river-io https://x-access-token:${RIVER_IO_PAT}@github.com/river-io/MeowPasswordC.git
          git push river-io refs/remotes/origin/main:refs/heads/main --force
          git push river-io "refs/tags/${TAG}" --force

      - name: Create matching release on river-io/MeowPasswordC
        env:
          GH_TOKEN: ${{ secrets.RIVER_IO_PAT }}
          SOURCE_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.vars.outputs.tag }}
        run: |
          META=$(GH_TOKEN="$SOURCE_TOKEN" gh release view "$TAG" --json name,body,isPrerelease)
          TITLE=$(echo "$META" | jq -r .name)
          PRERELEASE=$(echo "$META" | jq -r .isPrerelease)
          echo "$META" | jq -r .body > /tmp/notes.md

          ARGS=(--repo river-io/MeowPasswordC --title "$TITLE" --notes-file /tmp/notes.md)
          if [ "$PRERELEASE" = "true" ]; then
            ARGS+=(--prerelease)
          fi
          gh release create "$TAG" "${ARGS[@]}"

      - name: Reconcile Pages config on river-io mirror
        if: hashFiles('docs/index.html') != ''
        env:
          GH_TOKEN: ${{ secrets.RIVER_IO_PAT }}
        run: |
          MIRROR="river-io/MeowPasswordC"
          EXPECTED='{"build_type":"legacy","source":{"branch":"main","path":"/docs"}}'

          if gh api "repos/${MIRROR}/pages" >/dev/null 2>&1; then
            CURRENT=$(gh api "repos/${MIRROR}/pages" --jq '{build_type,source}')
            if [ "$CURRENT" != "$(echo "$EXPECTED" | jq -c .)" ]; then
              echo "Pages drift on ${MIRROR} — reconciling to legacy main/docs"
              echo "$EXPECTED" | gh api -X PUT "repos/${MIRROR}/pages" --input -
              gh api -X POST "repos/${MIRROR}/pages/builds" || true
            else
              echo "Pages on ${MIRROR} already legacy main/docs — no change"
            fi
          else
            echo "Pages not enabled on ${MIRROR} — enabling with legacy main/docs"
            echo "$EXPECTED" | gh api -X POST "repos/${MIRROR}/pages" --input -
          fi
